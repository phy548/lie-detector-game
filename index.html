<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>測謊機 — 你能分辨 AI 嗎？</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --text: #f0ede6;
      --muted: #888;
      --accent: #e8d5a3;
      --green: #4caf7d;
      --red: #e05c5c;
      --green-bg: #0d2b1a;
      --red-bg: #2b0d0d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 860px;
      padding: 48px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .score-display {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .score-display span {
      color: var(--accent);
      font-size: 1.1rem;
    }

    .hero {
      width: 100%;
      max-width: 860px;
      padding: 32px 24px 0;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 860px;
      padding: 32px 24px 0;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    main {
      width: 100%;
      max-width: 860px;
      padding: 32px 24px 48px;
    }

    .loading-state {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    .topic-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .topic-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
      line-height: 1.4;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 580px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }

    .card:hover { border-color: #555; transform: translateY(-2px); }
    .card.selected { border-color: var(--accent); background: #1f1e18; }
    .card.correct { border-color: var(--green); background: var(--green-bg); cursor: default; }
    .card.wrong { border-color: var(--red); background: var(--red-bg); cursor: default; }
    .card.revealed { cursor: default; }

    .card-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card.selected .card-tag { color: var(--accent); }
    .card.correct .card-tag { color: var(--green); }
    .card.wrong .card-tag { color: var(--red); }

    .card-tag-badge {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
    }

    .card-body {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #ccc;
    }

    .card.correct .card-body { color: #a8d5b5; }
    .card.wrong .card-body { color: #d5a8a8; }

    .card-verdict {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #333;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      display: none;
    }

    .card.correct .card-verdict { display: block; color: var(--green); }
    .card.wrong .card-verdict { display: block; color: var(--red); }

    .action-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hint {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 14px 40px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-confirm { background: var(--accent); color: #0e0e0e; }
    .btn-confirm:hover { background: #f0e0b0; transform: translateY(-1px); }
    .btn-confirm:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .btn-next { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-next:hover { background: #1f1e18; transform: translateY(-1px); }

    .result-panel {
      width: 100%;
      border-radius: 12px;
      padding: 20px 24px;
      display: none;
    }

    .result-panel.show { display: block; }
    .result-panel.correct-panel { background: var(--green-bg); border: 1px solid var(--green); }
    .result-panel.wrong-panel { background: var(--red-bg); border: 1px solid var(--red); }

    .result-headline {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result-panel.correct-panel .result-headline { color: var(--green); }
    .result-panel.wrong-panel .result-headline { color: var(--red); }

    .result-stat {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .result-stat strong { color: var(--accent); }

    .end-screen {
      text-align: center;
      padding: 40px 0;
      display: none;
    }

    .end-screen.show { display: block; }

    .end-score-big {
      font-family: 'Space Mono', monospace;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }

    .end-label { font-size: 1rem; color: var(--muted); margin-bottom: 32px; }
    .end-verdict { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }

    .end-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 36px;
    }

    .btn-restart { background: var(--accent); color: #0e0e0e; }
    .btn-restart:hover { background: #f0e0b0; }

    .error-state {
      text-align: center;
      padding: 60px 0;
      color: var(--red);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .corner-deco {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: #
